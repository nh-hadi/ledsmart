name: Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'   # Trigger saat ada tag versi baru (misal: v1.0.0)
  workflow_dispatch:  # Bisa dijalankan manual dari GitHub UI

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ──
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Java (dibutuhkan Android build tools) ──
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Setup Flutter SDK ──
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true

      # ── 4. Install dependensi Flutter ──
      - name: Install Dependencies
        run: flutter pub get

      # ── 5. Analisis kode (opsional, tidak block build) ──
      - name: Analyze Code
        run: flutter analyze --no-fatal-infos || true

      # ── 6. Build APK Release ──
      - name: Build APK (Release)
        run: flutter build apk --release --build-name=${{ github.ref_name }} --build-number=${{ github.run_number }}

      # ── 7. Rename APK dengan nama versi ──
      - name: Rename APK
        run: |
          VERSION=${{ github.ref_name }}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/ledsmart-${VERSION}.apk

      # ── 8. Upload APK sebagai artifact build ──
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ledsmart-apk-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/ledsmart-*.apk
          retention-days: 30

      # ── 9. Buat GitHub Release dan attach APK (hanya saat ada tag) ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "🚀 LedSmart ${{ github.ref_name }}"
          body: |
            ## 💡 LedSmart ${{ github.ref_name }}

            Kontroler LED RGB WS2812B via Flutter & ESP8266.

            ### ✅ Cara Install
            1. Download file `ledsmart-${{ github.ref_name }}.apk` di bawah
            2. Aktifkan **"Izinkan Sumber Tidak Dikenal"** di HP Android
            3. Install APK
            4. Sambungkan HP ke WiFi AP ESP8266: `controlRGB_AP`
            5. Buka app → Setting → masukkan IP: `192.168.4.1`

            ### 🔧 Hardware
            - ESP8266 (NodeMCU / ESP-12F)
            - LED Strip WS2812B
            - Firmware: [controlRGB](https://github.com/nh-hadi/ledsmart)

            ### 📋 Changelog
            - Rilis perdana aplikasi kontroler LED RGB
            - Fitur: Color Picker, Animasi Efek, Playlist, Koneksi WebSocket ke ESP8266
          files: |
            build/app/outputs/flutter-apk/ledsmart-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
