name: Build & Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Bisa dijalankan manual dari GitHub UI

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ──
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Java (dibutuhkan Android build tools) ──
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Setup Flutter SDK ──
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      # ── 4. Install dependensi Flutter ──
      - name: Install Dependencies
        run: flutter pub get

      # ── 5. Analisis kode (opsional, tidak block build) ──
      - name: Analyze Code
        run: flutter analyze --no-fatal-infos || true

      # ── 6. Build APK Release ──
      - name: Build APK (Release)
        run: flutter build apk --release --no-shrink

      # ── 7. Rename APK dengan nama versi ──
      - name: Rename APK
        run: |
          VERSION=${{ github.ref_name }}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/ledsmart-${VERSION}.apk

      # ── 8. Upload APK sebagai artifact build ──
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ledsmart-apk-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/ledsmart-*.apk
          retention-days: 30


